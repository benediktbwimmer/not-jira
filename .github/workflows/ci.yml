name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check --workspaces --if-present

      - name: Test
        run: npm test --workspaces --if-present

      - name: Benchmark gates
        run: node scripts/benchmark-gates.mjs

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-gates
          path: artifacts/benchmark
